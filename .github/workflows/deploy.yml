name: Deploy to Production

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Build project
        run: npm run build

      - name: Build Docker API Image
        run: docker build -f Dockerfile.api -t relay-api .

      - name: Build Docker Worker Image
        run: docker build -f Dockerfile.worker -t relay-worker .

      - name: Build Docker Web Image
        run: docker build -f Dockerfile.web -t relay-web .

      - name: Deployment Summary
        run: |
          echo "✅ Build completed successfully."
          echo "Docker images built successfully."
          echo "No deployment provider configured."